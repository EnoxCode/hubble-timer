<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif;
    background: linear-gradient(135deg, #c8b8e8 0%, #b8a8e0 15%, #a090d8 30%, #9080c8 45%, #8878c0 60%, #c0a8d8 75%, #d8b8e0 90%, #e0c8e8 100%);
    min-height: 100vh;
    padding: 24px;
    position: relative;
    overflow: hidden;
  }

  .blob { position: absolute; border-radius: 50%; filter: blur(1px); opacity: 0.6; }
  .blob-1 { width: 220px; height: 220px; background: #5040a0; top: -40px; left: 80px; }
  .blob-2 { width: 160px; height: 160px; background: #6050b0; top: 100px; left: -20px; }
  .blob-3 { width: 300px; height: 300px; background: #4838a0; bottom: -80px; right: -60px; }
  .blob-4 { width: 100px; height: 100px; background: #7060c0; bottom: 200px; left: 40px; }

  .page-title {
    color: rgba(255,255,255,0.5);
    font-size: 11px;
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 20px;
    position: relative;
    z-index: 10;
  }

  .timer-widget {
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    background: rgba(20, 10, 50, 0.55);
    border: 1px solid rgba(255, 255, 255, 0.18);
    border-radius: 20px;
    box-shadow: 0 8px 32px rgba(20, 10, 60, 0.4);
    padding: 20px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    width: 160px;
    position: relative;
    z-index: 10;
  }

  .timer-label {
    font-size: 12px;
    letter-spacing: 2.5px;
    color: rgba(255,255,255,0.75);
    text-transform: uppercase;
    font-weight: 600;
  }

  .timers-row {
    display: flex;
    gap: 14px;
    flex-wrap: wrap;
    position: relative;
    z-index: 10;
    align-items: flex-end;
  }

  .state-label {
    font-size: 10px;
    color: rgba(255,255,255,0.35);
    letter-spacing: 1px;
    text-transform: uppercase;
    margin-bottom: 6px;
    text-align: center;
  }

  .section-title {
    color: rgba(255,255,255,0.5);
    font-size: 11px;
    letter-spacing: 2px;
    text-transform: uppercase;
    margin: 28px 0 12px;
    position: relative;
    z-index: 10;
  }
</style>
</head>
<body>

<div class="blob blob-1"></div>
<div class="blob blob-2"></div>
<div class="blob blob-3"></div>
<div class="blob blob-4"></div>

<div class="page-title">Hubble Dashboard — Cooking Page</div>

<div class="section-title">Countdown</div>
<div class="timers-row">

  <!-- Idle -->
  <div>
    <div class="state-label">Idle</div>
    <div class="timer-widget">
      <svg width="108" height="108" viewBox="0 0 108 108">
        <circle cx="54" cy="54" r="44" fill="none" stroke="rgba(255,255,255,0.1)" stroke-width="9" stroke-dasharray="7 5"/>
        <text x="54" y="51" text-anchor="middle" fill="rgba(255,255,255,0.3)" font-size="17" font-family="monospace" font-weight="700">--:--</text>
        <text x="54" y="67" text-anchor="middle" fill="rgba(255,255,255,0.2)" font-size="8" letter-spacing="2">WAITING</text>
      </svg>
    </div>
  </div>

  <!-- Running green -->
  <div>
    <div class="state-label">Running</div>
    <div class="timer-widget">
      <div class="timer-label">Pizza</div>
      <svg width="108" height="108" viewBox="0 0 108 108">
        <circle cx="54" cy="54" r="44" fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="9"/>
        <circle cx="54" cy="54" r="44" fill="none" stroke="#1edd6e" stroke-width="9"
          stroke-dasharray="225 276" stroke-linecap="round"
          transform="rotate(-90 54 54)"/>
        <text x="54" y="51" text-anchor="middle" fill="#ffffff" font-size="19" font-weight="800" font-family="monospace">08:45</text>
        <text x="54" y="67" text-anchor="middle" fill="rgba(255,255,255,0.4)" font-size="8" letter-spacing="2">REMAINING</text>
      </svg>
    </div>
  </div>

  <!-- Under 5 min red -->
  <div>
    <div class="state-label">&lt; 5 min</div>
    <div class="timer-widget">
      <div class="timer-label">Pizza</div>
      <svg width="108" height="108" viewBox="0 0 108 108">
        <circle cx="54" cy="54" r="44" fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="9"/>
        <circle cx="54" cy="54" r="44" fill="none" stroke="#ff4136" stroke-width="9"
          stroke-dasharray="63 276" stroke-linecap="round"
          transform="rotate(-90 54 54)"/>
        <text x="54" y="51" text-anchor="middle" fill="#ffffff" font-size="19" font-weight="800" font-family="monospace">02:48</text>
        <text x="54" y="67" text-anchor="middle" fill="rgba(255,255,255,0.4)" font-size="8" letter-spacing="2">REMAINING</text>
      </svg>
    </div>
  </div>

  <!-- Paused -->
  <div>
    <div class="state-label">Paused</div>
    <div class="timer-widget">
      <div class="timer-label" style="color:rgba(255,255,255,0.4)">Pizza</div>
      <svg width="108" height="108" viewBox="0 0 108 108">
        <circle cx="54" cy="54" r="44" fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="9"/>
        <circle cx="54" cy="54" r="44" fill="none" stroke="#1edd6e" stroke-width="9" opacity="0.25"
          stroke-dasharray="225 276" stroke-linecap="round"
          transform="rotate(-90 54 54)"/>
        <text x="54" y="51" text-anchor="middle" fill="rgba(255,255,255,0.5)" font-size="19" font-weight="800" font-family="monospace">08:45</text>
        <text x="54" y="67" text-anchor="middle" fill="#f39c12" font-size="8" letter-spacing="2">PAUSED</text>
      </svg>
    </div>
  </div>

  <!-- Done -->
  <div>
    <div class="state-label">Done</div>
    <div class="timer-widget" style="background:rgba(180,20,20,0.35); border-color:rgba(255,80,60,0.5); box-shadow:0 8px 32px rgba(200,30,10,0.4), 0 0 0 1px rgba(255,80,60,0.2);">
      <div class="timer-label" style="color:#ff6b5b">Pizza</div>
      <svg width="108" height="108" viewBox="0 0 108 108">
        <circle cx="54" cy="54" r="44" fill="none" stroke="rgba(255,80,60,0.25)" stroke-width="9"/>
        <text x="54" y="51" text-anchor="middle" fill="#ff5545" font-size="19" font-weight="800" font-family="monospace">00:00</text>
        <text x="54" y="67" text-anchor="middle" fill="#ff5545" font-size="8" letter-spacing="2">DONE</text>
      </svg>
    </div>
  </div>

</div>

<!-- STOPWATCH -->
<div class="section-title">Stopwatch</div>
<div class="timers-row">

  <!-- Idle -->
  <div>
    <div class="state-label">Idle</div>
    <div class="timer-widget" style="width:155px; padding:24px 20px; gap:6px;">
      <div style="font-size:42px; font-weight:800; color:rgba(255,255,255,0.2); font-family:monospace; letter-spacing:2px; line-height:1;">--:--</div>
      <div style="font-size:9px; color:rgba(255,255,255,0.2); letter-spacing:2px; text-transform:uppercase;">WAITING</div>
    </div>
  </div>

  <!-- Running -->
  <div>
    <div class="state-label">Running</div>
    <div class="timer-widget" style="width:155px; padding:24px 20px; gap:6px;">
      <div class="timer-label" style="margin-bottom:2px;">Soup</div>
      <div style="font-size:42px; font-weight:800; color:#ffffff; font-family:monospace; letter-spacing:2px; line-height:1;">12:03</div>
      <div style="font-size:9px; color:rgba(255,255,255,0.4); letter-spacing:2px; text-transform:uppercase;">ELAPSED</div>
    </div>
  </div>

  <!-- Paused -->
  <div>
    <div class="state-label">Paused</div>
    <div class="timer-widget" style="width:155px; padding:24px 20px; gap:6px;">
      <div class="timer-label" style="color:rgba(255,255,255,0.35); margin-bottom:2px;">Soup</div>
      <div style="font-size:42px; font-weight:800; color:rgba(255,255,255,0.4); font-family:monospace; letter-spacing:2px; line-height:1;">12:03</div>
      <div style="font-size:9px; color:#f39c12; letter-spacing:2px; text-transform:uppercase;">PAUSED</div>
    </div>
  </div>

</div>

</body>
</html>
