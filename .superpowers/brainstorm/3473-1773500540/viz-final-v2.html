<h2>Visualization States</h2>
<p class="subtitle">All states for both visualization types</p>

<div class="section">
  <h3 style="margin-bottom:16px;">Countdown — Circular</h3>
  <div style="display:flex; gap:20px; flex-wrap:wrap; justify-content:center;">

    <!-- No timer set -->
    <div style="display:flex; flex-direction:column; align-items:center; gap:6px;">
      <div style="font-size:10px; color:#555; letter-spacing:1px; text-transform:uppercase;">No timer set</div>
      <div style="background:#111; border-radius:12px; padding:20px; display:flex; flex-direction:column; align-items:center; gap:8px; width:130px;">
        <svg width="90" height="90" viewBox="0 0 90 90">
          <circle cx="45" cy="45" r="38" fill="none" stroke="#222" stroke-width="8" stroke-dasharray="6 4"/>
          <text x="45" y="42" text-anchor="middle" fill="#444" font-size="11" font-family="monospace">—:——</text>
          <text x="45" y="56" text-anchor="middle" fill="#333" font-size="7" letter-spacing="1">WAITING</text>
        </svg>
      </div>
    </div>

    <!-- Running green -->
    <div style="display:flex; flex-direction:column; align-items:center; gap:6px;">
      <div style="font-size:10px; color:#555; letter-spacing:1px; text-transform:uppercase;">Running</div>
      <div style="background:#111; border-radius:12px; padding:20px; display:flex; flex-direction:column; align-items:center; gap:8px; width:130px;">
        <div style="font-size:11px; letter-spacing:2px; color:#aaa; text-transform:uppercase;">Pizza</div>
        <svg width="90" height="90" viewBox="0 0 90 90">
          <circle cx="45" cy="45" r="38" fill="none" stroke="#1a2a1a" stroke-width="8"/>
          <circle cx="45" cy="45" r="38" fill="none" stroke="#27ae60" stroke-width="8"
            stroke-dasharray="214 239" stroke-dashoffset="0" stroke-linecap="round"
            transform="rotate(-90 45 45)"/>
          <text x="45" y="42" text-anchor="middle" fill="#fff" font-size="16" font-weight="700" font-family="monospace">08:45</text>
          <text x="45" y="56" text-anchor="middle" fill="#555" font-size="7" letter-spacing="1">REMAINING</text>
        </svg>
      </div>
    </div>

    <!-- Running red (< 5min) -->
    <div style="display:flex; flex-direction:column; align-items:center; gap:6px;">
      <div style="font-size:10px; color:#555; letter-spacing:1px; text-transform:uppercase;">&lt; 5 min left</div>
      <div style="background:#111; border-radius:12px; padding:20px; display:flex; flex-direction:column; align-items:center; gap:8px; width:130px;">
        <div style="font-size:11px; letter-spacing:2px; color:#aaa; text-transform:uppercase;">Pizza</div>
        <svg width="90" height="90" viewBox="0 0 90 90">
          <circle cx="45" cy="45" r="38" fill="none" stroke="#2a1010" stroke-width="8"/>
          <circle cx="45" cy="45" r="38" fill="none" stroke="#e74c3c" stroke-width="8"
            stroke-dasharray="60 239" stroke-dashoffset="0" stroke-linecap="round"
            transform="rotate(-90 45 45)"/>
          <text x="45" y="42" text-anchor="middle" fill="#fff" font-size="16" font-weight="700" font-family="monospace">03:12</text>
          <text x="45" y="56" text-anchor="middle" fill="#555" font-size="7" letter-spacing="1">REMAINING</text>
        </svg>
      </div>
    </div>

    <!-- Paused -->
    <div style="display:flex; flex-direction:column; align-items:center; gap:6px;">
      <div style="font-size:10px; color:#555; letter-spacing:1px; text-transform:uppercase;">Paused</div>
      <div style="background:#111; border-radius:12px; padding:20px; display:flex; flex-direction:column; align-items:center; gap:8px; width:130px;">
        <div style="font-size:11px; letter-spacing:2px; color:#666; text-transform:uppercase;">Pizza</div>
        <svg width="90" height="90" viewBox="0 0 90 90">
          <circle cx="45" cy="45" r="38" fill="none" stroke="#1a2a1a" stroke-width="8"/>
          <circle cx="45" cy="45" r="38" fill="none" stroke="#27ae60" stroke-width="8" opacity="0.35"
            stroke-dasharray="214 239" stroke-dashoffset="0" stroke-linecap="round"
            transform="rotate(-90 45 45)"/>
          <text x="45" y="42" text-anchor="middle" fill="#888" font-size="16" font-weight="700" font-family="monospace">08:45</text>
          <text x="45" y="56" text-anchor="middle" fill="#e67e22" font-size="7" letter-spacing="1">PAUSED</text>
        </svg>
      </div>
    </div>

    <!-- Done -->
    <div style="display:flex; flex-direction:column; align-items:center; gap:6px;">
      <div style="font-size:10px; color:#555; letter-spacing:1px; text-transform:uppercase;">Done</div>
      <div style="background:#111; border-radius:12px; padding:20px; display:flex; flex-direction:column; align-items:center; gap:8px; width:130px;">
        <div style="font-size:11px; letter-spacing:2px; color:#e74c3c; text-transform:uppercase;">Pizza</div>
        <svg width="90" height="90" viewBox="0 0 90 90">
          <circle cx="45" cy="45" r="38" fill="none" stroke="#e74c3c" stroke-width="8" opacity="0.2"/>
          <text x="45" y="42" text-anchor="middle" fill="#e74c3c" font-size="16" font-weight="700" font-family="monospace">00:00</text>
          <text x="45" y="56" text-anchor="middle" fill="#e74c3c" font-size="7" letter-spacing="1">DONE</text>
        </svg>
      </div>
    </div>

  </div>
</div>

<div class="section" style="margin-top:32px;">
  <h3 style="margin-bottom:16px;">Stopwatch — Digital</h3>
  <div style="display:flex; gap:20px; flex-wrap:wrap; justify-content:center;">

    <!-- No timer set -->
    <div style="display:flex; flex-direction:column; align-items:center; gap:6px;">
      <div style="font-size:10px; color:#555; letter-spacing:1px; text-transform:uppercase;">No timer set</div>
      <div style="background:#111; border-radius:12px; padding:24px 28px; display:flex; flex-direction:column; align-items:center; gap:6px; width:140px;">
        <div style="font-size:48px; font-weight:700; color:#333; font-family:monospace; letter-spacing:3px;">—:——</div>
        <div style="font-size:9px; color:#333; letter-spacing:1px; text-transform:uppercase;">WAITING</div>
      </div>
    </div>

    <!-- Running -->
    <div style="display:flex; flex-direction:column; align-items:center; gap:6px;">
      <div style="font-size:10px; color:#555; letter-spacing:1px; text-transform:uppercase;">Running</div>
      <div style="background:#111; border-radius:12px; padding:24px 28px; display:flex; flex-direction:column; align-items:center; gap:6px; width:140px;">
        <div style="font-size:11px; letter-spacing:2px; color:#aaa; text-transform:uppercase; margin-bottom:2px;">Soup</div>
        <div style="font-size:48px; font-weight:700; color:#fff; font-family:monospace; letter-spacing:3px;">12:03</div>
        <div style="font-size:9px; color:#555; letter-spacing:1px; text-transform:uppercase;">ELAPSED</div>
      </div>
    </div>

    <!-- Paused -->
    <div style="display:flex; flex-direction:column; align-items:center; gap:6px;">
      <div style="font-size:10px; color:#555; letter-spacing:1px; text-transform:uppercase;">Paused</div>
      <div style="background:#111; border-radius:12px; padding:24px 28px; display:flex; flex-direction:column; align-items:center; gap:6px; width:140px;">
        <div style="font-size:11px; letter-spacing:2px; color:#666; text-transform:uppercase; margin-bottom:2px;">Soup</div>
        <div style="font-size:48px; font-weight:700; color:#888; font-family:monospace; letter-spacing:3px;">12:03</div>
        <div style="font-size:9px; color:#e67e22; letter-spacing:1px; text-transform:uppercase;">PAUSED</div>
      </div>
    </div>

  </div>
</div>
