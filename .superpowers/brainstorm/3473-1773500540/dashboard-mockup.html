<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif;
    background: linear-gradient(135deg, #c8b8e8 0%, #b8a8e0 15%, #a090d8 30%, #9080c8 45%, #8878c0 60%, #c0a8d8 75%, #d8b8e0 90%, #e0c8e8 100%);
    min-height: 100vh;
    padding: 24px;
    position: relative;
    overflow: hidden;
  }

  /* Background blobs like the real dashboard */
  .blob {
    position: absolute;
    border-radius: 50%;
    filter: blur(1px);
    opacity: 0.6;
  }
  .blob-1 { width: 220px; height: 220px; background: #5040a0; top: -40px; left: 80px; }
  .blob-2 { width: 160px; height: 160px; background: #6050b0; top: 100px; left: -20px; }
  .blob-3 { width: 300px; height: 300px; background: #4838a0; bottom: -80px; right: -60px; }
  .blob-4 { width: 100px; height: 100px; background: #7060c0; bottom: 200px; left: 40px; }

  .page-title {
    color: rgba(255,255,255,0.5);
    font-size: 11px;
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 20px;
    position: relative;
    z-index: 10;
  }

  /* Frosted glass panel — matches Hubble's --hubble-panel-bg style */
  .timer-widget {
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    background: rgba(255, 255, 255, 0.12);
    border: 1px solid rgba(255, 255, 255, 0.22);
    border-radius: 20px;
    box-shadow: 0 8px 32px rgba(40, 20, 80, 0.25);
    padding: 20px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
    width: 160px;
    position: relative;
    z-index: 10;
  }

  .timer-label {
    font-size: 11px;
    letter-spacing: 2px;
    color: rgba(255,255,255,0.6);
    text-transform: uppercase;
    font-weight: 500;
  }

  .state-tag {
    font-size: 9px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    margin-top: 2px;
  }

  .timers-row {
    display: flex;
    gap: 14px;
    flex-wrap: wrap;
    position: relative;
    z-index: 10;
  }

  .state-label {
    font-size: 10px;
    color: rgba(255,255,255,0.35);
    letter-spacing: 1px;
    text-transform: uppercase;
    margin-bottom: 6px;
    text-align: center;
  }

  .section-title {
    color: rgba(255,255,255,0.5);
    font-size: 12px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    margin: 28px 0 12px;
    position: relative;
    z-index: 10;
  }
</style>
</head>
<body>

<div class="blob blob-1"></div>
<div class="blob blob-2"></div>
<div class="blob blob-3"></div>
<div class="blob blob-4"></div>

<div class="page-title">Hubble Dashboard — Cooking Page</div>

<!-- COUNTDOWN TIMERS -->
<div class="section-title">Countdown</div>
<div class="timers-row">

  <!-- Idle -->
  <div>
    <div class="state-label">Idle</div>
    <div class="timer-widget">
      <svg width="100" height="100" viewBox="0 0 100 100">
        <circle cx="50" cy="50" r="42" fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="8" stroke-dasharray="6 5"/>
        <text x="50" y="47" text-anchor="middle" fill="rgba(255,255,255,0.25)" font-size="15" font-family="monospace" font-weight="700">--:--</text>
        <text x="50" y="62" text-anchor="middle" fill="rgba(255,255,255,0.2)" font-size="7" letter-spacing="1.5">WAITING</text>
      </svg>
    </div>
  </div>

  <!-- Running green -->
  <div>
    <div class="state-label">Running</div>
    <div class="timer-widget">
      <div class="timer-label">Pizza</div>
      <svg width="100" height="100" viewBox="0 0 100 100">
        <circle cx="50" cy="50" r="42" fill="none" stroke="rgba(255,255,255,0.07)" stroke-width="8"/>
        <circle cx="50" cy="50" r="42" fill="none" stroke="#2ecc71" stroke-width="8"
          stroke-dasharray="214 264" stroke-dashoffset="0" stroke-linecap="round"
          transform="rotate(-90 50 50)"/>
        <text x="50" y="47" text-anchor="middle" fill="rgba(255,255,255,0.95)" font-size="16" font-weight="700" font-family="monospace">08:45</text>
        <text x="50" y="62" text-anchor="middle" fill="rgba(255,255,255,0.35)" font-size="7" letter-spacing="1.5">REMAINING</text>
      </svg>
    </div>
  </div>

  <!-- Under 5 min red -->
  <div>
    <div class="state-label">&lt; 5 min</div>
    <div class="timer-widget">
      <div class="timer-label">Pizza</div>
      <svg width="100" height="100" viewBox="0 0 100 100">
        <circle cx="50" cy="50" r="42" fill="none" stroke="rgba(255,255,255,0.07)" stroke-width="8"/>
        <circle cx="50" cy="50" r="42" fill="none" stroke="#e74c3c" stroke-width="8"
          stroke-dasharray="60 264" stroke-dashoffset="0" stroke-linecap="round"
          transform="rotate(-90 50 50)"/>
        <text x="50" y="47" text-anchor="middle" fill="rgba(255,255,255,0.95)" font-size="16" font-weight="700" font-family="monospace">02:48</text>
        <text x="50" y="62" text-anchor="middle" fill="rgba(255,255,255,0.35)" font-size="7" letter-spacing="1.5">REMAINING</text>
      </svg>
    </div>
  </div>

  <!-- Paused -->
  <div>
    <div class="state-label">Paused</div>
    <div class="timer-widget">
      <div class="timer-label" style="color:rgba(255,255,255,0.35)">Pizza</div>
      <svg width="100" height="100" viewBox="0 0 100 100">
        <circle cx="50" cy="50" r="42" fill="none" stroke="rgba(255,255,255,0.07)" stroke-width="8"/>
        <circle cx="50" cy="50" r="42" fill="none" stroke="#2ecc71" stroke-width="8" opacity="0.3"
          stroke-dasharray="214 264" stroke-dashoffset="0" stroke-linecap="round"
          transform="rotate(-90 50 50)"/>
        <text x="50" y="47" text-anchor="middle" fill="rgba(255,255,255,0.45)" font-size="16" font-weight="700" font-family="monospace">08:45</text>
        <text x="50" y="62" text-anchor="middle" fill="#e67e22" font-size="7" letter-spacing="1.5">PAUSED</text>
      </svg>
    </div>
  </div>

  <!-- Done -->
  <div>
    <div class="state-label">Done</div>
    <div class="timer-widget" style="border-color:rgba(231,76,60,0.4); box-shadow: 0 8px 32px rgba(231,76,60,0.2), 0 0 0 1px rgba(231,76,60,0.15);">
      <div class="timer-label" style="color:rgba(231,76,60,0.9)">Pizza</div>
      <svg width="100" height="100" viewBox="0 0 100 100">
        <circle cx="50" cy="50" r="42" fill="none" stroke="rgba(231,76,60,0.2)" stroke-width="8"/>
        <text x="50" y="47" text-anchor="middle" fill="#e74c3c" font-size="16" font-weight="700" font-family="monospace">00:00</text>
        <text x="50" y="62" text-anchor="middle" fill="#e74c3c" font-size="7" letter-spacing="1.5">DONE</text>
      </svg>
    </div>
  </div>

</div>

<!-- STOPWATCH -->
<div class="section-title">Stopwatch</div>
<div class="timers-row">

  <!-- Idle -->
  <div>
    <div class="state-label">Idle</div>
    <div class="timer-widget" style="width:150px; padding:22px 20px;">
      <div style="font-size:40px; font-weight:800; color:rgba(255,255,255,0.15); font-family:monospace; letter-spacing:2px; line-height:1;">--:--</div>
      <div style="font-size:9px; color:rgba(255,255,255,0.15); letter-spacing:1.5px; text-transform:uppercase; margin-top:4px;">WAITING</div>
    </div>
  </div>

  <!-- Running -->
  <div>
    <div class="state-label">Running</div>
    <div class="timer-widget" style="width:150px; padding:22px 20px;">
      <div class="timer-label" style="margin-bottom:2px;">Soup</div>
      <div style="font-size:40px; font-weight:800; color:rgba(255,255,255,0.95); font-family:monospace; letter-spacing:2px; line-height:1;">12:03</div>
      <div style="font-size:9px; color:rgba(255,255,255,0.35); letter-spacing:1.5px; text-transform:uppercase; margin-top:4px;">ELAPSED</div>
    </div>
  </div>

  <!-- Paused -->
  <div>
    <div class="state-label">Paused</div>
    <div class="timer-widget" style="width:150px; padding:22px 20px;">
      <div class="timer-label" style="color:rgba(255,255,255,0.3); margin-bottom:2px;">Soup</div>
      <div style="font-size:40px; font-weight:800; color:rgba(255,255,255,0.35); font-family:monospace; letter-spacing:2px; line-height:1;">12:03</div>
      <div style="font-size:9px; color:#e67e22; letter-spacing:1.5px; text-transform:uppercase; margin-top:4px;">PAUSED</div>
    </div>
  </div>

</div>

</body>
</html>
